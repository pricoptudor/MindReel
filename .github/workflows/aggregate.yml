name: MindReel Content Aggregation

on:
  schedule:
    # Run every 6 hours (UTC): midnight, 6am, noon, 6pm
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      max_items:
        description: 'Max items per source'
        required: false
        default: '20'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  TARGET_USER_ID: ${{ secrets.TARGET_USER_ID }}
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENAI_MODEL: gemini-2.0-flash

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: aggregator/requirements.txt

      - name: Install dependencies
        run: pip install -r aggregator/requirements.txt

      - name: Run aggregation
        env:
          PYTHONPATH: ${{ github.workspace }}
          MAX_ITEMS: ${{ inputs.max_items || '20' }}
        run: |
          python -c "
          import asyncio, time, os

          from aggregator.config import get_settings
          from aggregator.connectors import (
              YouTubeConnector, ArxivConnector, HackerNewsConnector,
              RssConnector, DevtoConnector, WikipediaConnector, PodcastConnector
          )
          from aggregator.classifier import classify_content_batch
          from aggregator.storage import store_content, fetch_user_interests, fetch_user_sub_interests

          MAX = int(os.environ.get('MAX_ITEMS', '20'))

          async def run(name, conn, queries, interests, uid, n):
              t0 = time.time()
              print(f'{name:>12}... ', end='', flush=True)
              try:
                  raw = await conn.fetch(queries, max_items=n)
              except Exception as e:
                  print(f'ERR: {str(e)[:60]}')
                  return 0
              if not raw:
                  print('0 fetched')
                  return 0
              all_cl = await classify_content_batch(raw, interests)
              cl = [c for c in all_cl if c.interest_ids and c.confidence >= 0.4]
              st = await store_content(cl, uid) if cl else 0
              dt = time.time() - t0
              print(f'{len(raw):>3} fetched -> {len(cl):>3} matched -> {st:>3} stored ({dt:.1f}s)')
              return st

          async def main():
              t0 = time.time()
              s = get_settings()
              uid = s.target_user_id
              interests = await fetch_user_interests(uid)
              subs = await fetch_user_sub_interests(uid)
              queries = list(interests.values()) + [sub['name'] for sub in subs]
              queries.extend([
                  'quantum computing explained', 'AI news 2026',
                  'piano tutorial', 'space telescope discovery',
                  'self improvement habits', 'knowledge graph tutorial',
                  'machine learning beginner', 'astrophysics news',
              ])
              print(f'{len(queries)} queries | max {MAX} items/source')
              print()
              total = 0
              total += await run('YouTube', YouTubeConnector(), queries, interests, uid, MAX)
              total += await run('arXiv', ArxivConnector(), queries, interests, uid, MAX)
              total += await run('HackerNews', HackerNewsConnector(), queries, interests, uid, MAX)
              total += await run('RSS', RssConnector(), queries, interests, uid, MAX)
              total += await run('Dev.to', DevtoConnector(), queries, interests, uid, MAX)
              total += await run('Wikipedia', WikipediaConnector(), queries, interests, uid, MAX)
              total += await run('Podcasts', PodcastConnector(), queries, interests, uid, MAX)
              dt = time.time() - t0
              print(f'\n=== {total} items stored in {dt:.0f}s ===')

          asyncio.run(main())
          "
